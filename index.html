<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Browser</title>
  <style>
    :root {
      --bg-0: #0a1020;
      --bg-1: #111c35;
      --panel: rgba(15, 24, 44, 0.78);
      --panel-strong: rgba(9, 15, 31, 0.92);
      --ink: #ebf0ff;
      --muted: #9daccc;
      --accent: #3aa7ff;
      --accent-strong: #1974ff;
      --edge: rgba(132, 161, 220, 0.34);
      --success: #4de2a0;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 0%, rgba(46, 136, 255, 0.24), transparent 42%),
        radial-gradient(circle at 90% 18%, rgba(20, 206, 184, 0.16), transparent 40%),
        linear-gradient(155deg, var(--bg-0) 0%, var(--bg-1) 50%, #070d1a 100%);
      font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    .app {
      width: min(1100px, 94vw);
      margin: 24px auto 28px;
      background: linear-gradient(160deg, var(--panel) 0%, var(--panel-strong) 100%);
      border: 1px solid var(--edge);
      border-radius: 20px;
      box-shadow:
        0 22px 45px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(102, 160, 255, 0.08) inset;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--edge);
      background: linear-gradient(105deg, rgba(62, 122, 255, 0.13), rgba(33, 214, 189, 0.08));
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2.2vw, 1.7rem);
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 14px;
      border-bottom: 1px solid var(--edge);
      background: linear-gradient(180deg, rgba(17, 28, 52, 0.72), rgba(10, 17, 33, 0.32));
      scrollbar-width: thin;
    }

    .tabs + .tabs {
      padding-top: 10px;
      background: linear-gradient(180deg, rgba(14, 24, 44, 0.72), rgba(9, 15, 28, 0.32));
    }

    .file-menu {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      overflow-y: auto;
      overflow-x: hidden;
      max-height: 240px;
      align-items: start;
    }

    .file-menu .tab {
      width: 100%;
      text-align: left;
      border-radius: 10px;
    }

    .tabs-label {
      padding: 10px 14px 0;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .tab {
      border: 1px solid rgba(124, 157, 220, 0.36);
      border-radius: 999px;
      background: rgba(16, 28, 52, 0.72);
      color: var(--ink);
      padding: 7px 12px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 0.86rem;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .tab:hover {
      transform: translateY(-1px);
      border-color: rgba(92, 188, 255, 0.72);
    }

    .tab[aria-selected="true"] {
      background: linear-gradient(120deg, var(--accent), var(--accent-strong));
      color: #f2f8ff;
      border-color: rgba(94, 180, 255, 0.95);
      box-shadow: 0 0 20px rgba(47, 149, 255, 0.34);
    }

    main {
      padding: 14px;
    }

    .prompt-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .prompt-card {
      border: 1px solid var(--edge);
      border-radius: var(--radius);
      background: linear-gradient(170deg, rgba(16, 28, 52, 0.92) 0%, rgba(12, 20, 38, 0.95) 100%);
      padding: 13px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 168px;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .prompt-card:hover {
      transform: translateY(-2px);
      border-color: rgba(95, 177, 255, 0.66);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .prompt-title {
      margin: 0;
      font-size: 1.03rem;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .prompt-snippet {
      margin: 0;
      color: #bcc9e4;
      font-size: 0.9rem;
      line-height: 1.42;
    }

    .copy-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .copy-btn {
      border: 1px solid rgba(136, 188, 255, 0.4);
      background: linear-gradient(140deg, var(--accent), var(--accent-strong));
      color: #fff;
      font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 10px;
      cursor: pointer;
      padding: 8px 12px;
      min-width: 82px;
      box-shadow: 0 8px 18px rgba(34, 118, 255, 0.26);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    .copy-btn:hover {
      filter: brightness(1.06);
      box-shadow: 0 10px 22px rgba(34, 118, 255, 0.34);
    }

    .copy-btn:active {
      transform: scale(0.98);
    }

    .copy-feedback {
      color: var(--success);
      font-size: 0.84rem;
      min-height: 1em;
    }

    .empty {
      color: var(--muted);
      padding: 10px 4px;
      font-style: italic;
    }

    @media (max-width: 620px) {
      .app {
        width: 100%;
        margin: 0;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
        min-height: 100vh;
      }

      .tabs {
        padding: 10px;
        gap: 6px;
      }

      main {
        padding: 10px;
      }

      .prompt-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Prompt Browser</h1>
      <div id="meta" class="meta">Loading prompt files...</div>
    </header>
    <div class="tabs-label">Groups</div>
    <div id="groupTabs" class="tabs" role="tablist" aria-label="Prompt groups"></div>
    <div class="tabs-label">Folders</div>
    <div id="folderTabs" class="tabs" role="tablist" aria-label="Prompt folders"></div>
    <div class="tabs-label">Files</div>
    <div id="fileTabs" class="tabs file-menu" role="tablist" aria-label="Prompt files"></div>
    <main>
      <section id="cards" class="prompt-grid" aria-live="polite"></section>
    </main>
  </div>

  <script src="./prompts-data.js"></script>
  <script>
    const data = window.PROMPT_BROWSER_DATA;
    const groupTabsEl = document.getElementById("groupTabs");
    const folderTabsEl = document.getElementById("folderTabs");
    const fileTabsEl = document.getElementById("fileTabs");
    const cardsEl = document.getElementById("cards");
    const metaEl = document.getElementById("meta");

    if (!data || !Array.isArray(data.files) || data.files.length === 0) {
      metaEl.textContent = "No prompt data found. Run: node scripts/build_prompt_data.mjs";
      cardsEl.innerHTML = '<p class="empty">No prompts to display.</p>';
    } else {
      const filesWithMeta = data.files.map((file) => {
        const parts = file.relativePath.split(/[\\/]/).filter(Boolean);
        const folder = parts.length > 1 ? parts.slice(0, -1).join("/") : "root";
        const group =
          parts[0] === "syngery-prompts" && parts.length >= 3
            ? parts[1]
            : "all";
        return { ...file, folder, group };
      });

      const groups = ["all", ...new Set(filesWithMeta.filter((file) => file.group !== "all").map((file) => file.group))];

      let activeGroupIndex = 0;
      let activeFolderIndex = 0;
      let activeFileIndex = 0;

      function escapeHtml(text) {
        return text
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      async function copyPrompt(text, button, feedbackEl) {
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const helper = document.createElement("textarea");
          helper.value = text;
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.focus();
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }

        button.textContent = "COPIED";
        feedbackEl.textContent = "Copied to clipboard";
        setTimeout(() => {
          button.textContent = "COPY";
          feedbackEl.textContent = "";
        }, 1200);
      }

      function getActiveGroup() {
        return groups[activeGroupIndex];
      }

      function getGroupFilteredFiles() {
        const group = getActiveGroup();
        if (group === "all") {
          return filesWithMeta;
        }
        return filesWithMeta.filter((file) => file.group === group);
      }

      function getFolders() {
        return [...new Set(getGroupFilteredFiles().map((file) => file.folder))];
      }

      function getActiveFolder() {
        const folders = getFolders();
        if (!folders.length) {
          return "";
        }
        if (activeFolderIndex >= folders.length) {
          activeFolderIndex = 0;
        }
        return folders[activeFolderIndex];
      }

      function getActiveFiles() {
        const folder = getActiveFolder();
        if (!folder) {
          return [];
        }
        return getGroupFilteredFiles().filter((file) => file.folder === folder);
      }

      function renderGroupTabs() {
        groupTabsEl.innerHTML = "";
        groups.forEach((group, index) => {
          const filesCount =
            group === "all"
              ? filesWithMeta.length
              : filesWithMeta.filter((file) => file.group === group).length;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tab";
          button.role = "tab";
          button.id = `group-tab-${index}`;
          button.setAttribute("aria-controls", "folderTabs");
          button.setAttribute("aria-selected", String(index === activeGroupIndex));
          button.textContent = `${group} (${filesCount})`;
          button.addEventListener("click", () => {
            activeGroupIndex = index;
            activeFolderIndex = 0;
            activeFileIndex = 0;
            renderGroupTabs();
            renderFolderTabs();
            renderFileTabs();
            renderCards();
          });
          groupTabsEl.appendChild(button);
        });
      }

      function renderFolderTabs() {
        const folders = getFolders();
        folderTabsEl.innerHTML = "";
        folders.forEach((folder, index) => {
          const filesCount = getGroupFilteredFiles().filter((file) => file.folder === folder).length;
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tab";
          button.role = "tab";
          button.id = `folder-tab-${index}`;
          button.setAttribute("aria-controls", "fileTabs");
          button.setAttribute("aria-selected", String(index === activeFolderIndex));
          button.textContent = `${folder} (${filesCount})`;
          button.addEventListener("click", () => {
            activeFolderIndex = index;
            activeFileIndex = 0;
            renderFolderTabs();
            renderFileTabs();
            renderCards();
          });
          folderTabsEl.appendChild(button);
        });
      }

      function renderFileTabs() {
        const folderFiles = getActiveFiles();
        fileTabsEl.innerHTML = "";

        folderFiles.forEach((file, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "tab";
          button.role = "tab";
          button.id = `file-tab-${index}`;
          button.setAttribute("aria-controls", "cards");
          button.setAttribute("aria-selected", String(index === activeFileIndex));
          button.textContent = file.fileName;
          button.addEventListener("click", () => {
            activeFileIndex = index;
            renderFileTabs();
            renderCards();
          });
          fileTabsEl.appendChild(button);
        });
      }

      function renderCards() {
        const group = getActiveGroup();
        const folder = getActiveFolder();
        const folderFiles = getActiveFiles();
        const file = folderFiles[activeFileIndex];

        if (!file) {
          metaEl.textContent = `Group: ${group} | Folder: ${folder || "none"} | No files available`;
          cardsEl.innerHTML = '<p class="empty">No files in this folder.</p>';
          return;
        }

        metaEl.textContent =
          `${data.fileCount} files total | Group: ${group} | Folder: ${folder} (${folderFiles.length} files) | ` +
          `${file.promptCount} prompts in ${file.relativePath}`;

        if (!file.prompts.length) {
          cardsEl.innerHTML = '<p class="empty">This file has no prompts.</p>';
          return;
        }

        cardsEl.innerHTML = file.prompts
          .map(
            (prompt, promptIndex) => `
              <article class="prompt-card">
                <h2 class="prompt-title">${escapeHtml(prompt.title || `Prompt ${promptIndex + 1}`)}</h2>
                <p class="prompt-snippet">${escapeHtml(prompt.snippet)}</p>
                <div class="copy-row">
                  <button class="copy-btn" type="button" data-prompt-id="${escapeHtml(prompt.id)}">COPY</button>
                  <span class="copy-feedback" aria-hidden="true"></span>
                </div>
              </article>
            `
          )
          .join("");

        const buttons = cardsEl.querySelectorAll(".copy-btn");
        buttons.forEach((button, idx) => {
          const feedback = button.parentElement.querySelector(".copy-feedback");
          button.addEventListener("click", () => copyPrompt(file.prompts[idx].text, button, feedback));
        });
      }

      renderGroupTabs();
      renderFolderTabs();
      renderFileTabs();
      renderCards();
    }
  </script>
</body>
</html>
